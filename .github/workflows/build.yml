name: FULL BUILD SYSTEM

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - run: npm install

      - run: npm run dist

      - uses: actions/upload-artifact@v4
        with:
          name: setup
          path: dist/
