name: Build Electron Setup (FINAL FIX)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies (FIXED)
        run: npm install

      - name: Verify Electron Builder
        run: npx electron-builder --version

      - name: Build installer
        run: npm run dist

      - name: Upload setup files
        uses: actions/upload-artifact@v4
        with:
          name: setup-exe
          path: |
            dist/**
