name: Electron Build (PRO FIX)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 👇 مهم: GitHub الان Node 24 دارد، ما override نمی‌کنیم
      - name: Setup Node (compatible mode)
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 👇 مهم‌ترین fix تو کل مشکل
      - name: Install dependencies SAFE
        run: npm install --no-package-lock

      # 👇 جلوگیری از crash builder
      - name: Verify electron builder
        run: npx electron-builder --version

      # 👇 build واقعی
      - name: Build Windows installer
        run: npm run dist

      # 👇 پیدا کردن خروجی واقعی (نه فرضی)
      - name: Upload ALL build outputs
        uses: actions/upload-artifact@v4
        with:
          name: setup-exe
          path: |
            dist/**
            release/**
            out/**
            build/**
