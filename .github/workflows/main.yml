name: Build Electron App (FINAL FIX)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies (SAFE MODE)
        run: npm install

      - name: Build Electron app
        run: npm run dist

      - name: Upload setup
        uses: actions/upload-artifact@v4
        with:
          name: setup
          path: |
            dist/**
            release/**
            out/**
